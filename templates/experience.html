  <style>
    /* 全局样式和帮助中心完全一致 */
    :root {
      --cyber-purple: #9333EA;
      --cyber-blue: #3B82F6;
      --cyber-pink: #EC4899;
      --dark-bg: #0F0529;
    }
    body {
      background-color: var(--dark-bg) !important;
      color: #fff !important;
    }
    .navbar-nav .nav-link {
      color: #fff !important;
    }
    .navbar-nav .nav-link.active {
      background: linear-gradient(90deg, var(--cyber-pink), var(--cyber-purple)) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      font-weight: 600;
    }
    .banner-text h1 {
      background: linear-gradient(90deg, #fff, var(--cyber-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .banner-text a.active {
      background: linear-gradient(90deg, var(--cyber-pink), var(--cyber-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 卡片样式和帮助中心完全一致 */
    .help-card {
      border: 2px solid;
      border-image: linear-gradient(90deg, var(--cyber-blue), var(--cyber-pink)) 1 !important;
      border-radius: 12px !important;
      overflow: hidden;
      padding: 30px;
      background: rgba(255,255,255,0.05);
    }
    .form-label {
      color: #fff !important;
      font-size: 16px;
      font-weight: 500;
    }
    .form-control {
      background: rgba(255,255,255,0.1) !important;
      border: 1px solid var(--cyber-blue) !important;
      color: #fff !important;
      padding: 10px 15px;
      border-radius: 6px;
    }
    .form-text {
      color: rgba(255,255,255,0.6) !important;
    }

    /* 按钮样式完全统一 */
    .shadow__btn {
      background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-purple)) !important;
      border: none !important;
      color: #fff !important;
      padding: 12px 20px;
      font-weight: 600;
      border-radius: 6px;
      transition: 0.3s;
    }
    .shadow__btn:hover {
      background: linear-gradient(90deg, var(--cyber-purple), var(--cyber-pink)) !important;
      color: #fff !important;
    }
    .shadow__btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 分析结果展示区 */
    #resultArea {
      display: none;
      margin-top: 30px;
    }
    .result-card {
      border: 2px solid;
      border-image: linear-gradient(90deg, var(--cyber-blue), var(--cyber-purple)) 1 !important;
      border-radius: 12px;
      padding: 25px;
      background: rgba(255,255,255,0.05);
    }
    .loading-text {
      text-align: center;
      color: var(--cyber-blue);
      font-size: 18px;
    }
  </style>
</head>

  <!-- 搜索弹窗 -->
  <div class="modal fade" id="searchModal">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">搜索</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="输入搜索内容...">
            </div>
            <button type="submit" class="shadow__btn w-100">搜索</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Banner 【重点】背景图路径改成正确的static路径 -->
  <section id="banner" class="cmn-banner" style="background: url(../static/image/banner.jpg) no-repeat center/cover;">
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <div class="wow animate__animated animate__fadeInLeft banner-text">
            <h1>在线体验</h1>
            <a href="../templates/index.html">首页 |</a> <a class="active" href="../templates/experience.html"> 在线体验</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 上传表单区域 -->
  <section id="gallery">
    <div class="container">
      <div class="row justify-content-center">
        <div class="wow animate__animated animate__fadeInUp col-lg-8">
          <div class="help-card">
            <form id="uploadForm" method="POST" action="/api/analyze">
              <div class="mb-4">
                <label class="form-label">企业名称</label>
                <input type="text" class="form-control" id="companyName" name="company_name" placeholder="请输入企业名称" required>
              </div>
              <div class="mb-4">
                <label class="form-label">上传财务 Excel 文件</label>
                <input type="file" class="form-control" id="excelFile" name="file" accept=".xlsx,.xls" required>
                <div class="form-text">支持 xlsx / xls 格式，包含收入、支出、利润、负债等财务字段</div>
              </div>
              <button type="submit" class="shadow__btn w-100" id="submitBtn">开始智能分析</button>
            </form>
          </div>

          <!-- 分析结果展示区 -->
          <div id="resultArea">
            <div class="result-card">
              <h3 style="background: linear-gradient(90deg, var(--cyber-pink), var(--cyber-purple));-webkit-background-clip: text;-webkit-text-fill-color: transparent;">
                智能分析结果
              </h3>
              <div id="resultContent" class="mt-3">
                <!-- 后端返回的结果会在这里展示 -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->

              <p class="mt-3">企业数字大脑 | 2026大数据主题赛参赛作品，多智能体驱动企业运营分析与决策支持。</p>

              <h3>快速导航</h3>

                <li><a href="../templates/help.html">帮助中心</a></li>
              </ul>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="footer-widget">
              <h3>订阅更新</h3>
              <p>订阅获取系统最新功能与大数据领域前沿资讯。</p>
              <div class="subscribe-form">
